<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" type="text/css" href="style.CSS\student.css">
</head>
<body>

    <div class="contact-container">
        <h2>Get in Touch</h2>
        <p>Fill out the form below and we'll get back to you shortly.</p>

        <form action="" >
            
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required><br><br>
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required><br><br>
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+254 700 000 000"><br><br>  
                <label for="subject">Subject Line</label>
                <input type="text" id="subject" name="subject" placeholder="How can we help?" required><br><br>
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type your message here..." required></textarea><br><br>
            

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
    </div>

</body>
</html>
